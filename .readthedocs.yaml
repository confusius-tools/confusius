version: 2

build:
  os: ubuntu-24.04
  apt_packages:
    - jq
    - unzip
  tools:
    python: "3.13"
  commands:
    - |
      # Download the pre-built site artifact uploaded by GitHub Actions.
      #
      # For branch/tag builds GHA triggers this build only after the artifact is
      # ready, so the first poll succeeds immediately.  For PR builds the GitHub
      # App triggers RTD at the same time as GHA; we poll until the artifact
      # appears (gallery cache hits keep GHA builds short in most PRs).
      SHA="${READTHEDOCS_GIT_COMMIT_HASH}"
      REPO="confusius-tools/confusius"
      MAX_WAIT=600
      WAITED=0

      while true; do
        ARTIFACT_ID=$(curl -sf \
          -H "Authorization: token ${GITHUB_TOKEN}" \
          "https://api.github.com/repos/${REPO}/actions/artifacts?name=docs-site-${SHA}&per_page=1" \
          | jq -r '.artifacts[0].id // empty')

        [ -n "$ARTIFACT_ID" ] && break

        if [ "$WAITED" -ge "$MAX_WAIT" ]; then
          echo "Timed out waiting for GHA artifact after ${MAX_WAIT}s." >&2
          exit 1
        fi

        echo "Artifact not ready yet — retrying in 30s (${WAITED}s elapsed)."
        sleep 30
        WAITED=$((WAITED + 30))
      done

      curl -sfL \
        -H "Authorization: token ${GITHUB_TOKEN}" \
        "https://api.github.com/repos/${REPO}/actions/artifacts/${ARTIFACT_ID}/zip" \
        -o site.zip

      mkdir -p "${READTHEDOCS_OUTPUT}/html/"
      unzip -q site.zip -d "${READTHEDOCS_OUTPUT}/html/"
