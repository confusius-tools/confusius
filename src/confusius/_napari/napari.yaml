name: confusius
display_name: ConfUSIus
schema_version: "0.2.1"

contributions:
  commands:
    - id: confusius.open_widget
      title: Open ConfUSIus
      python_name: confusius._napari._widget:ConfUSIusWidget

    - id: confusius.read_nifti
      title: Read NIfTI file
      python_name: confusius._napari._io._readers:read_nifti

    - id: confusius.read_scan
      title: Read SCAN file
      python_name: confusius._napari._io._readers:read_scan

    - id: confusius.read_zarr
      title: Read Zarr store
      python_name: confusius._napari._io._readers:read_zarr

    - id: confusius.write_nifti
      title: Write NIfTI file
      python_name: confusius._napari._io._writers:write_nifti

    - id: confusius.write_nifti_labels
      title: Write labels to NIfTI file
      python_name: confusius._napari._io._writers:write_nifti

    - id: confusius.write_zarr
      title: Write Zarr store
      python_name: confusius._napari._io._writers:write_zarr

    - id: confusius.write_zarr_labels
      title: Write labels to Zarr store
      python_name: confusius._napari._io._writers:write_zarr

    - id: confusius.open_sample_nunez_elizalde_2022
      title: Open Nunez-Elizalde 2022 sample
      python_name: confusius._napari._sample:open_nunez_elizalde_2022_sample

  widgets:
    - command: confusius.open_widget
      display_name: ConfUSIus
      autogenerate: false

  sample_data:
    - key: nunez-elizalde-2022
      display_name: Nunez-Elizalde 2022
      command: confusius.open_sample_nunez_elizalde_2022

  readers:
    - command: confusius.read_nifti
      accepts_directories: false
      filename_patterns:
        - "*.nii"
        - "*.nii.gz"

    - command: confusius.read_scan
      accepts_directories: false
      filename_patterns:
        - "*.scan"

    - command: confusius.read_zarr
      accepts_directories: true
      filename_patterns:
        - "*.zarr"

  writers:
    - command: confusius.write_nifti
      layer_types:
        - image
      filename_extensions:
        - .nii
        - .nii.gz

    - command: confusius.write_nifti_labels
      layer_types:
        - labels
      filename_extensions:
        - .nii
        - .nii.gz

    - command: confusius.write_zarr
      layer_types:
        - image
      filename_extensions:
        - .zarr

    - command: confusius.write_zarr_labels
      layer_types:
        - labels
      filename_extensions:
        - .zarr
